<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rewards Dashboard</title>
        <link rel="stylesheet" href="/style.css" />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>"
        />
    </head>
    <body>
        <div class="bg-mesh"></div>
        <div class="bg-noise"></div>

        <div class="dashboard">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <div class="topbar-logo">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
                                stroke="white"
                                stroke-width="2"
                                fill="none"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </div>
                    <div class="topbar-title"><span>Orbit</span>&nbsp;Dashboard</div>
                </div>
                <div class="topbar-right">
                    <div class="refresh-indicator">
                        <span class="refresh-dot"></span>
                        <span id="refreshTimer">Auto-refresh in 60s</span>
                    </div>
                    <button class="btn-icon" onclick="refreshAll()" title="Refresh now">
                        <svg viewBox="0 0 24 24">
                            <path d="M23 4v6h-6M1 20v-6h6" />
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
                        </svg>
                    </button>
                    <button class="btn-logout" onclick="logout()">
                        <svg
                            width="14"
                            height="14"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
                        </svg>
                        Logout
                    </button>
                </div>
            </header>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Stats Cards -->
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card blue">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2" /></svg>
                        </div>
                        <div class="stat-label">Total Runs</div>
                        <div class="stat-value" id="totalRuns">-</div>
                    </div>
                    <div class="stat-card purple">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24">
                                <polygon
                                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                                />
                            </svg>
                        </div>
                        <div class="stat-label">Points Collected</div>
                        <div class="stat-value" id="totalPoints">-</div>
                    </div>
                    <div class="stat-card cyan">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                        </div>
                        <div class="stat-label">Last Run</div>
                        <div class="stat-value time-value" id="lastRun">-</div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
                            </svg>
                        </div>
                        <div class="stat-label">Active Accounts</div>
                        <div class="stat-value" id="activeAccounts">-</div>
                    </div>
                    <div class="stat-card red">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
                                />
                                <line x1="12" y1="9" x2="12" y2="13" />
                                <line x1="12" y1="17" x2="12.01" y2="17" />
                            </svg>
                        </div>
                        <div class="stat-label">Errors (24h)</div>
                        <div class="stat-value" id="recentErrors">-</div>
                    </div>
                </div>

                <!-- Tab Navigation -->
                <div class="tab-nav">
                    <button class="tab-btn active" data-tab="logs">
                        <svg viewBox="0 0 24 24">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                        </svg>
                        Run Logs
                    </button>
                    <button class="tab-btn" data-tab="sessions">
                        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>
                        Sessions
                    </button>
                </div>

                <!-- Logs Tab -->
                <div class="tab-content active" id="tab-logs">
                    <div class="section">
                        <div class="section-header">
                            <h2 class="section-title">
                                <svg viewBox="0 0 24 24">
                                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                                    <polyline points="14 2 14 8 20 8" />
                                </svg>
                                Recent Logs
                            </h2>
                            <div class="section-controls">
                                <div class="filter-pills">
                                    <button class="filter-pill active" data-level="all">All</button>
                                    <button class="filter-pill" data-level="info">Info</button>
                                    <button class="filter-pill" data-level="warn">Warn</button>
                                    <button class="filter-pill" data-level="error">Error</button>
                                </div>
                            </div>
                        </div>
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width: 80px">Level</th>
                                        <th style="width: 160px">Timestamp</th>
                                        <th style="width: 140px">Account</th>
                                        <th style="width: 90px">Platform</th>
                                        <th style="width: 160px">Title</th>
                                        <th>Message</th>
                                        <th style="width: 100px">Points</th>
                                    </tr>
                                </thead>
                            </table>
                            <div class="scrollable-body" id="logsBody">
                                <!-- Rows injected via JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sessions Tab -->
                <div class="tab-content" id="tab-sessions">
                    <div class="section">
                        <div class="section-header">
                            <h2 class="section-title">
                                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>
                                Stored Sessions
                            </h2>
                        </div>
                        <div class="sessions-grid" id="sessionsGrid">
                            <!-- Cards injected via JS -->
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Toast Container -->
        <div class="toast-container" id="toastContainer"></div>

        <script>
            // =========================================
            //  STATE
            // =========================================
            let allLogs = []
            let currentFilter = 'all'
            let refreshInterval = null
            let countdown = 60

            // =========================================
            //  INIT
            // =========================================
            document.addEventListener('DOMContentLoaded', () => {
                refreshAll()
                startAutoRefresh()
                initTabs()
                initFilters()
            })

            // =========================================
            //  TABS
            // =========================================
            function initTabs() {
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
                        btn.classList.add('active')
                        document.getElementById('tab-' + btn.dataset.tab).classList.add('active')
                    })
                })
            }

            // =========================================
            //  FILTERS
            // =========================================
            function initFilters() {
                document.querySelectorAll('.filter-pill').forEach(pill => {
                    pill.addEventListener('click', () => {
                        document.querySelectorAll('.filter-pill').forEach(p => {
                            p.classList.remove('active', 'warn-active', 'error-active')
                        })
                        pill.classList.add('active')
                        if (pill.dataset.level === 'warn') pill.classList.add('warn-active')
                        if (pill.dataset.level === 'error') pill.classList.add('error-active')
                        currentFilter = pill.dataset.level
                        renderLogs()
                    })
                })
            }

            // =========================================
            //  DATA FETCHING
            // =========================================
            async function fetchJSON(url) {
                const res = await fetch(url)
                if (res.status === 401) {
                    window.location.href = '/login'
                    throw new Error('Unauthorized')
                }
                if (!res.ok) throw new Error(`HTTP ${res.status}`)
                return res.json()
            }

            async function refreshAll() {
                countdown = 60
                try {
                    const [stats, logs, sessions] = await Promise.all([
                        fetchJSON('/api/stats'),
                        fetchJSON('/api/runs?limit=300'),
                        fetchJSON('/api/sessions')
                    ])
                    renderStats(stats)
                    allLogs = logs
                    renderLogs()
                    renderSessions(sessions)
                } catch (err) {
                    if (err.message !== 'Unauthorized') {
                        showToast('Failed to fetch data: ' + err.message, 'error')
                    }
                }
            }

            // =========================================
            //  RENDER: STATS
            // =========================================
            function renderStats(stats) {
                animateValue('totalRuns', stats.totalRuns)
                animateValue('totalPoints', stats.totalPoints.toLocaleString())
                animateValue('activeAccounts', stats.activeAccounts)
                animateValue('recentErrors', stats.recentErrors)

                const lastRunEl = document.getElementById('lastRun')
                if (stats.lastRun) {
                    lastRunEl.textContent = formatTimeAgo(new Date(stats.lastRun))
                    lastRunEl.title = new Date(stats.lastRun).toLocaleString()
                } else {
                    lastRunEl.textContent = 'Never'
                }
            }

            function animateValue(id, value) {
                const el = document.getElementById(id)
                el.textContent = value
                el.style.transform = 'scale(1.05)'
                el.style.transition = 'transform 0.3s ease'
                setTimeout(() => {
                    el.style.transform = 'scale(1)'
                }, 300)
            }

            // =========================================
            //  RENDER: LOGS TABLE
            // =========================================
            function renderLogs() {
                const container = document.getElementById('logsBody')
                const filtered = currentFilter === 'all' ? allLogs : allLogs.filter(l => l.level === currentFilter)

                if (filtered.length === 0) {
                    container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" fill="none" stroke-width="1.5"/><polyline points="14 2 14 8 20 8" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
            <h3>No logs found</h3>
            <p>Run the bot to start seeing logs here</p>
          </div>`
                    return
                }

                // Build table using template for performance
                const rows = filtered
                    .map(log => {
                        const level = log.level || 'info'
                        const badgeClass = `badge-${level}`
                        const ts = log.timestamp ? formatTimestamp(new Date(log.timestamp)) : '-'
                        const platform = log.platform ? getPlatformTag(log.platform) : '-'
                        const account = log.username || '-'
                        const title = escapeHtml(log.title || '')
                        const message = escapeHtml(log.message || '')
                        const points = renderPoints(log.points_data)

                        return `<tr>
          <td><span class="badge ${badgeClass}"><span class="badge-dot"></span>${level}</span></td>
          <td><span class="timestamp">${ts}</span></td>
          <td><span class="account-name">${escapeHtml(account)}</span></td>
          <td>${platform}</td>
          <td><span class="log-title">${title}</span></td>
          <td><span class="log-message">${message}</span></td>
          <td>${points}</td>
        </tr>`
                    })
                    .join('')

                container.innerHTML = `<table><tbody>${rows}</tbody></table>`
            }

            function getPlatformTag(platform) {
                const p = platform.toLowerCase()
                let cls = ''
                if (p === 'main') cls = 'main'
                else if (p === 'mobile') cls = 'mobile'
                else if (p === 'desktop') cls = 'desktop'
                return `<span class="platform-tag ${cls}">${escapeHtml(platform)}</span>`
            }

            function renderPoints(pointsData) {
                if (!pointsData) return '-'
                const pts = typeof pointsData === 'string' ? JSON.parse(pointsData) : pointsData
                if (pts.collectedPoints != null && pts.collectedPoints > 0) {
                    return `<span class="points-badge">
          <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          +${pts.collectedPoints}
        </span>`
                }
                if (pts.finalPoints != null) {
                    return `<span style="font-size:0.8rem;color:var(--text-muted)">${pts.finalPoints.toLocaleString()}</span>`
                }
                return '-'
            }

            // =========================================
            //  RENDER: SESSIONS
            // =========================================
            function renderSessions(sessions) {
                const grid = document.getElementById('sessionsGrid')

                if (!sessions || sessions.length === 0) {
                    grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
            <h3>No sessions found</h3>
            <p>Session data will appear after the bot runs</p>
          </div>`
                    return
                }

                // Group by email
                const grouped = {}
                sessions.forEach(s => {
                    if (!grouped[s.email]) grouped[s.email] = { types: [], latestUpdate: null }
                    grouped[s.email].types.push(s.type)
                    const upd = new Date(s.updated_at)
                    if (!grouped[s.email].latestUpdate || upd > grouped[s.email].latestUpdate) {
                        grouped[s.email].latestUpdate = upd
                    }
                })

                grid.innerHTML = Object.entries(grouped)
                    .map(
                        ([email, data]) => `
        <div class="session-card">
          <div class="session-email">
            <span class="email-dot"></span>
            ${escapeHtml(email)}
          </div>
          <div class="session-types">
            ${data.types.map(t => `<span class="session-type-chip">${escapeHtml(t)}</span>`).join('')}
          </div>
          <div class="session-updated">Updated ${formatTimeAgo(data.latestUpdate)}</div>
        </div>
      `
                    )
                    .join('')
            }

            // =========================================
            //  AUTO-REFRESH
            // =========================================
            function startAutoRefresh() {
                if (refreshInterval) clearInterval(refreshInterval)
                refreshInterval = setInterval(() => {
                    countdown--
                    const timerEl = document.getElementById('refreshTimer')
                    if (countdown <= 0) {
                        refreshAll()
                        timerEl.textContent = 'Refreshing…'
                    } else {
                        timerEl.textContent = `Auto-refresh in ${countdown}s`
                    }
                }, 1000)
            }

            // =========================================
            //  AUTH
            // =========================================
            async function logout() {
                try {
                    await fetch('/api/logout', { method: 'POST' })
                } catch (e) {}
                window.location.href = '/login'
            }

            // =========================================
            //  UTILITIES
            // =========================================
            function formatTimestamp(date) {
                const now = new Date()
                const isToday = date.toDateString() === now.toDateString()
                const time = date.toLocaleTimeString('en-IN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                })
                if (isToday) return time
                const dateStr = date.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' })
                return `${dateStr} ${time}`
            }

            function formatTimeAgo(date) {
                const seconds = Math.floor((Date.now() - date.getTime()) / 1000)
                if (seconds < 60) return 'just now'
                const minutes = Math.floor(seconds / 60)
                if (minutes < 60) return `${minutes}m ago`
                const hours = Math.floor(minutes / 60)
                if (hours < 24) return `${hours}h ago`
                const days = Math.floor(hours / 24)
                if (days < 7) return `${days}d ago`
                return date.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' })
            }

            function escapeHtml(str) {
                const div = document.createElement('div')
                div.textContent = str
                return div.innerHTML
            }

            function showToast(message, type = 'success') {
                const container = document.getElementById('toastContainer')
                const toast = document.createElement('div')
                toast.className = `toast ${type}`
                toast.textContent = message
                container.appendChild(toast)
                setTimeout(() => {
                    toast.style.opacity = '0'
                    toast.style.transform = 'translateX(20px)'
                    toast.style.transition = 'all 0.3s ease'
                    setTimeout(() => toast.remove(), 300)
                }, 4000)
            }
        </script>
    </body>
</html>
